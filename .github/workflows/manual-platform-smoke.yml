      - name: llama-cli smoke test
        shell: pwsh
        run: |
          $model = Get-ChildItem -Path "models\gguf\1.7B" -Filter *.gguf -File | Select-Object -First 1
          if (-not $model) { throw "No GGUF model found in models\gguf\1.7B" }
          $binCandidates = @(
            "bin\cuda\llama-cli.exe",
            "bin\cpu\llama-cli.exe",
            "bin\hip\llama-cli.exe",
            "bin\vulkan\llama-cli.exe"
          )
          $bin = $binCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bin) { throw "llama-cli.exe not found under bin/" }
          & $bin -m $model.FullName -ngl 99 -c 2048 --log-disable -n 8 -p "Reply with exactly: ok"
          if ($LASTEXITCODE -ne 0) { throw "llama-cli smoke test failed" }

